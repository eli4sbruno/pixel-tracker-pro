<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL TRACKER - PRO EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --primary: #00ff41;
            --secondary: #ff0055;
            --accent: #00d4ff;
            --border-pixel: 4px solid #000;
            --shadow-pixel: 4px 4px 0px #000;
        }

        * { box-sizing: border-box; image-rendering: pixelated; }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-color);
            background-image: radial-gradient(#16213e 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-wrapper {
            width: 100%;
            max-width: 900px;
            display: none; 
            flex-direction: column;
            gap: 15px;
        }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 5px; }
        .nav-btn {
            background: #000; color: #555; border: var(--border-pixel);
            padding: 5px 20px; cursor: pointer; font-size: 1.2rem; font-family: 'VT323', monospace;
        }
        .nav-btn.active { color: var(--primary); border-bottom: none; background: var(--panel-color); transform: translateY(4px); }

        .auth-container {
            width: 100%; max-width: 400px; background: var(--panel-color);
            border: var(--border-pixel); box-shadow: var(--shadow-pixel); padding: 30px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .input-field {
            width: 100%; background: #000; border: 2px solid var(--accent);
            padding: 10px; color: var(--accent); font-family: 'VT323', monospace; font-size: 1.2rem; outline: none;
        }

        .user-bar { background: #000; border: var(--border-pixel); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .dashboard { background: var(--panel-color); border: var(--border-pixel); box-shadow: var(--shadow-pixel); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { border: 2px solid var(--accent); padding: 10px; background: rgba(0, 0, 0, 0.3); text-align: center; }
        .stat-value { font-size: 2.5rem; color: var(--accent); display: block; }

        .main-card { background: var(--panel-color); border: var(--border-pixel); box-shadow: var(--shadow-pixel); padding: 25px; text-align: center; }
        .timer-display { font-size: 6rem; color: var(--primary); text-shadow: 4px 4px 0px #004d1a; margin: 10px 0; }

        .pixel-btn {
            font-family: 'VT323', monospace; font-size: 1.4rem; padding: 8px 15px; cursor: pointer;
            border: var(--border-pixel); box-shadow: var(--shadow-pixel); background: #ccc; color: #000; text-transform: uppercase;
        }
        .pixel-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0; }
        .btn-primary { background: var(--primary); }
        .btn-secondary { background: var(--secondary); color: #fff; }
        .btn-accent { background: var(--accent); }

        .tasks-view { display: none; grid-template-columns: 200px 1fr; gap: 15px; min-height: 500px; }
        .tasks-sidebar { background: #000; border: var(--border-pixel); padding: 10px; }
        .list-item { padding: 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 5px; }
        .list-item.active { border: 1px solid var(--primary); color: var(--primary); }

        .tasks-content { background: var(--panel-color); border: var(--border-pixel); box-shadow: var(--shadow-pixel); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .task-input-area { display: flex; gap: 10px; border-bottom: 2px solid #000; padding-bottom: 15px; }
        .task-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; max-height: 400px; }
        .task-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .task-checkbox { width: 20px; height: 20px; border: 2px solid var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 4px; }
        .task-checkbox.checked::after { content: "X"; color: var(--primary); font-weight: bold; }
        .task-body { flex: 1; }
        .task-title { font-size: 1.4rem; }
        .task-title.completed { text-decoration: line-through; color: #555; }
        .task-notes { font-size: 0.9rem; color: #888; }

        .history-section { background: var(--panel-color); border: var(--border-pixel); box-shadow: var(--shadow-pixel); max-height: 250px; overflow-y: auto; }
        .history-item { padding: 10px 15px; border-bottom: 2px solid #000; display: flex; justify-content: space-between; align-items: center; }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; font-size: 2rem; color: var(--primary);
        }
    </style>
</head>
<body>

<div id="loadingOverlay">INICIALIZANDO...</div>

<div id="authScreen" class="auth-container" style="display: none;">
    <div style="font-size: 2.5rem; text-align: center; color: var(--primary);">PIXEL LOGIN</div>
    <input type="email" id="email" class="input-field" placeholder="E-MAIL">
    <input type="password" id="password" class="input-field" placeholder="SENHA">
    <div style="display: flex; gap: 10px;">
        <button class="pixel-btn btn-primary" style="flex: 1;" onclick="handleSignIn()">ENTRAR</button>
        <button class="pixel-btn btn-accent" style="flex: 1;" onclick="handleSignUp()">CADASTRAR</button>
    </div>
    <div id="authMsg" style="text-align: center; color: var(--secondary); font-size: 0.9rem;"></div>
</div>

<div id="appScreen" class="app-wrapper">
    <div class="user-bar">
        <div>USUÁRIO: <span id="userEmail" style="color: var(--accent)">...</span></div>
        <button class="pixel-btn" style="font-size: 0.8rem; padding: 4px 8px;" onclick="handleLogout()">LOGOUT</button>
    </div>

    <div class="nav-tabs">
        <button id="tabTracker" class="nav-btn active" onclick="switchTab('tracker')">CRONÔMETRO</button>
        <button id="tabTasks" class="nav-btn" onclick="switchTab('tasks')">TAREFAS</button>
    </div>

    <div id="viewTracker" class="view-content">
        <div class="dashboard">
            <div class="stat-card"><span>ARTES (MÊS)</span><span class="stat-value" id="monthArts">0</span></div>
            <div class="stat-card"><span>HORAS (MÊS)</span><span class="stat-value" id="monthHours">0.0h</span></div>
        </div>
        <div class="main-card">
            <input type="text" id="taskName" class="input-field" placeholder="> NOME DA ARTE..." style="margin-bottom: 15px;">
            <div class="timer-display" id="display">00:00:00</div>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="pixel-btn btn-primary" id="startBtn">INICIAR</button>
                <button class="pixel-btn btn-accent" id="finishBtn">FINALIZAR</button>
                <button class="pixel-btn" id="resetBtn">ZERAR</button>
            </div>
            <div id="statusMsg" style="margin-top: 10px; color: var(--accent);">PRONTO</div>
        </div>
        <div class="history-section">
            <div style="background: #000; padding: 5px 15px; border-bottom: 2px solid var(--primary);">LOGS_RECENTES</div>
            <div id="historyList"></div>
        </div>
    </div>

    <div id="viewTasks" class="tasks-view">
        <div class="tasks-sidebar">
            <div style="font-size: 1.2rem; color: var(--accent); margin-bottom: 10px;">LISTAS</div>
            <div class="list-item active">Minhas tarefas</div>
            <div class="list-item">Digital Gráfica</div>
            <div class="list-item">Financeiro</div>
        </div>
        <div class="tasks-content">
            <div class="task-input-area">
                <div style="flex: 1;">
                    <input type="text" id="newTaskTitle" class="input-field" placeholder="+ Adicionar uma tarefa">
                    <input type="text" id="newTaskNotes" class="input-field" style="font-size: 0.8rem; margin-top: 5px; border-color: #333;" placeholder="Notas/Detalhes...">
                </div>
                <button class="pixel-btn btn-primary" onclick="addTask()">ADD</button>
            </div>
            <ul id="taskList" class="task-list"></ul>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // INSIRA SUAS CHAVES AQUI
    const SUPABASE_URL = '//vtiljgnjzaxlwevbmyue.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_B4-tZ53Tfx_t7rk4LAkZ5Q_3eD7DRIQ'; 
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let sessionUser = null;
    let startTime = 0;
    let accumulatedTime = 0;
    let isRunning = false;
    let timerInterval = null;
    let historyData = [];
    let tasksData = [];

    async function init() {
        const { data: { session } } = await supabase.auth.getSession();
        updateAuthUI(session?.user || null);
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    window.handleSignIn = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) document.getElementById('authMsg').innerText = error.message;
        else updateAuthUI(data.user);
    };

    window.handleSignUp = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) document.getElementById('authMsg').innerText = error.message;
        else document.getElementById('authMsg').innerText = "Confirme seu e-mail!";
    };

    window.handleLogout = async () => { await supabase.auth.signOut(); updateAuthUI(null); };

    function updateAuthUI(user) {
        sessionUser = user;
        if (user) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'flex';
            document.getElementById('userEmail').innerText = user.email;
            fetchData();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
        }
    }

    async function fetchData() {
        if (!sessionUser) return;
        const hRes = await supabase.from('history').select('*').order('timestamp', { ascending: false });
        if (!hRes.error) { historyData = hRes.data; renderHistory(); updateDashboard(); }
        const tRes = await supabase.from('tasks').select('*').order('timestamp', { ascending: false });
        if (!tRes.error) { tasksData = tRes.data; renderTasks(); }
    }

    window.switchTab = (tab) => {
        document.getElementById('viewTracker').style.display = tab === 'tracker' ? 'block' : 'none';
        document.getElementById('viewTasks').style.display = tab === 'tasks' ? 'grid' : 'none';
        document.getElementById('tabTracker').classList.toggle('active', tab === 'tracker');
        document.getElementById('tabTasks').classList.toggle('active', tab === 'tasks');
    };

    window.addTask = async () => {
        const title = document.getElementById('newTaskTitle').value;
        const notes = document.getElementById('newTaskNotes').value;
        if (!title) return;
        const { error } = await supabase.from('tasks').insert([{ user_id: sessionUser.id, title, notes }]);
        if (!error) { document.getElementById('newTaskTitle').value = ""; document.getElementById('newTaskNotes').value = ""; fetchData(); }
    };

    window.toggleTask = async (id, status) => {
        await supabase.from('tasks').update({ is_completed: !status }).eq('id', id); fetchData();
    };

    window.deleteTask = async (id) => {
        if (confirm("Deletar tarefa?")) { await supabase.from('tasks').delete().eq('id', id); fetchData(); }
    };

    function renderTasks() {
        document.getElementById('taskList').innerHTML = tasksData.map(t => `
            <li class="task-item">
                <div class="task-checkbox ${t.is_completed ? 'checked' : ''}" onclick="toggleTask('${t.id}', ${t.is_completed})"></div>
                <div class="task-body">
                    <div class="task-title ${t.is_completed ? 'completed' : ''}">${t.title}</div>
                    ${t.notes ? `<div class="task-notes">${t.notes}</div>` : ''}
                </div>
                <button onclick="deleteTask('${t.id}')" style="background:none; border:none; color:var(--secondary); cursor:pointer; font-family:'VT323';">EXCLUIR</button>
            </li>
        `).join('');
    }

    function updateDisplay() {
        const totalMs = isRunning ? (accumulatedTime + (Date.now() - startTime)) : accumulatedTime;
        const sec = Math.floor(totalMs / 1000);
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
        document.getElementById('display').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    document.getElementById('startBtn').onclick = () => {
        if (!isRunning) { isRunning = true; startTime = Date.now(); document.getElementById('startBtn').innerText = "PAUSAR"; timerInterval = setInterval(updateDisplay, 100); }
        else { isRunning = false; accumulatedTime += (Date.now() - startTime); clearInterval(timerInterval); document.getElementById('startBtn').innerText = "CONTINUAR"; }
    };

    document.getElementById('finishBtn').onclick = async () => {
        const totalMs = isRunning ? (accumulatedTime + (Date.now() - startTime)) : accumulatedTime;
        const totalSec = Math.floor(totalMs / 1000);
        if (totalSec < 5) return;
        await supabase.from('history').insert([{ user_id: sessionUser.id, name: document.getElementById('taskName').value || "PROJETO", duration_text: document.getElementById('display').innerText, raw_seconds: totalSec }]);
        accumulatedTime = 0; isRunning = false; clearInterval(timerInterval);
        document.getElementById('taskName').value = ""; updateDisplay(); document.getElementById('startBtn').innerText = "INICIAR"; fetchData();
    };

    document.getElementById('resetBtn').onclick = () => { accumulatedTime = 0; isRunning = false; clearInterval(timerInterval); updateDisplay(); document.getElementById('startBtn').innerText = "INICIAR"; };

    function renderHistory() {
        document.getElementById('historyList').innerHTML = historyData.map(item => `
            <div class="history-item">
                <div><div style="color: var(--accent)">${item.name}</div><div style="font-size: 0.8rem; color: #555">${new Date(item.timestamp).toLocaleDateString()}</div></div>
                <span style="color: var(--primary)">${item.duration_text}</span>
            </div>
        `).join('');
    }

    function updateDashboard() {
        const now = new Date();
        const monthly = historyData.filter(i => { const d = new Date(i.timestamp); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
        const totalSec = monthly.reduce((acc, curr) => acc + curr.raw_seconds, 0);
        document.getElementById('monthArts').innerText = monthly.length;
        document.getElementById('monthHours').innerText = (totalSec / 3600).toFixed(1) + 'h';
    }

    init();
</script>
</body>
</html>
